name: Build my Angular App

on: 
  push:
      branches: [ main ]
jobs:
  build-anguar-app:
    runs-on: ubuntu-latest
    concurrency:
        group: deploy
        cancel-in-progress: true

    steps:
      - uses: actions/checkout@v6.0.3
      - name: Setup Node JS
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 22.x
      - name: Insall Dependencies
        run: npm install
      - name: Build Angular App
        run: npm run build
         
       
        
      
